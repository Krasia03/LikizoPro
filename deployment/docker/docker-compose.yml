version: '3.8'

# =====================================================================
# LIKIZOPRO - Docker Compose Configuration
# =====================================================================
# This docker-compose.yml orchestrates:
# - PHP-FPM Application Container
# - Nginx Web Server Container
# - MySQL Database Container
# - Redis Cache Container (optional)
#
# Usage:
#   1. cp .env.example .env
#   2. Update .env with your values
#   3. docker-compose up -d
# =====================================================================

services:
  # ===================================================================
  # MySQL Database
  # ===================================================================
  mysql:
    image: mysql:8.0
    container_name: likizopro_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_NAME:-likizopro_db}
      MYSQL_USER: ${DB_USER:-likizo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-SecurePass123!}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - likizopro_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================================================================
  # PHP-FPM Application
  # ===================================================================
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: likizopro_php
    restart: unless-stopped
    environment:
      PHP_MEMORY_LIMIT: 256M
      PHP_MAX_EXECUTION_TIME: 300
      PHP_UPLOAD_MAX_FILESIZE: 20M
      PHP_POST_MAX_SIZE: 25M
    volumes:
      - ./:/var/www/likizopro
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - likizopro_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===================================================================
  # Nginx Web Server
  # ===================================================================
  nginx:
    image: nginx:alpine
    container_name: likizopro_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./:/var/www/likizopro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - php
    networks:
      - likizopro_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===================================================================
  # Redis (Optional - for caching/sessions)
  # ===================================================================
  redis:
    image: redis:alpine
    container_name: likizopro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - likizopro_network
    command: redis-server --appendonly yes

# =====================================================================
# Networks
# =====================================================================
networks:
  likizopro_network:
    driver: bridge

# =====================================================================
# Volumes
# =====================================================================
volumes:
  mysql_data:
    driver: local
  nginx_logs:
    driver: local
  redis_data:
    driver: local
